name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Vorber ${{ github.ref_name }}'
          releaseBody: |
            See [log.md](https://github.com/nniikkoo15/vorber/blob/main/log.md) for the full changelog.

            **macOS:** download the `.dmg`. App is unsigned — after installing, run:
            ```
            xattr -dr com.apple.quarantine /Applications/Vorber.app
            ```
            or open via System Settings → Privacy & Security → Open Anyway.

            **Windows:** download the `.msi` installer.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
